services:
  postgres:
    image: postgres:16-alpine
    container_name: lyf9-postgres
    environment:
      POSTGRES_DB: lyf9
      POSTGRES_USER: lyf9
      POSTGRES_PASSWORD: lyf9_local
    ports:
      - "5432:5432"
    volumes:
      - lyf9_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: lyf9-redis
    ports:
      - "6379:6379"

volumes:
  lyf9_postgres_data:
